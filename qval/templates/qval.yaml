# Qval project config. See: qval doctor
provider: mock          # mock | openai | http
model: gpt-4o-mini      # model name (ignored when provider is mock)
suites_dir: suites      # where test suites live (not yet consumed by `qval run` — planned)
outputs_dir: outputs    # where runs, reports, evidence are written

# To evaluate a custom HTTP/API target instead of a model SDK (F-11), set
# provider: http and configure the target below. ${ENV} is interpolated and
# {{input}} is replaced with each test prompt at request time.
# target:
#   url: https://internal-ai-service.company.com/chat
#   method: POST
#   headers:
#     Authorization: Bearer ${API_TOKEN}
#   body_template: '{"message": "{{input}}"}'
#   response_path: $.message.content        # JSONPath-lite (dots + [index])
#   timeout_seconds: 30
#   retry: {max_attempts: 3, initial_backoff_seconds: 1, backoff_multiplier: 2}

# LLM judge-assist (F-12): pre-triage borderline needs_review findings. The
# judge annotates a suggestion + confidence + rationale; the human override
# always wins. It never runs on the severity_not bucket (critical).
# judge_assist:
#   enabled: true
#   only_when:
#     status: needs_review
#     severity_not: critical
#   model: claude-sonnet-4-6
#   require_human_final_decision: true   # false = auto-apply above min_confidence
#   min_confidence: 0.7
